org.gradle.jvmargs=-Xmx16G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=1G -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC -XX:SoftRefLRUPolicyMSPerMB=50
android.useAndroidX=true

# === Build Compilation Caching and Speed Optimizations ===
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.vfs.watch=true
org.gradle.daemon=true
org.gradle.configuration-cache=false

# Disable R8 full mode (which runs extra analysis passes) unless needed
android.enableR8.fullMode=false
android.nonTransitiveRClass=true
android.enableJetifier=false
