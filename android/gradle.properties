org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# === Build Compilation Caching and Speed Optimizations ===
org.gradle.caching=true
org.gradle.parallel=true
# (Configuration cache can sometimes clash with older Flutter SDKs, but is blazingly fast)
org.gradle.vfs.watch=true

# Disable R8 full mode (which runs extra analysis passes) unless needed
